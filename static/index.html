<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>RAG Chat</title>
    <style>
        body { font-family: Arial; max-width: 950px; margin: auto; padding: 20px; }
        #chat { border: 1px solid #ccc; height: 600px; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #f9f9f9; }
        .user { text-align: right; color: blue; margin: 5px; }
        .bot { text-align: left; color: green; margin: 5px; }
        .input-area { display: flex; gap: 10px; margin: 5px; }
        .system { text-align: center; color: black; margin: 5px; }
        #query { flex: 1; padding: 8px; }
        button { padding: 8px 16px; }

body {
  font-family: sans-serif;
  margin: 0;
  padding: 20px;
  background: #aaaaff;
  color: white;
}

#chat {
  max-width: 950px;
  margin: auto;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

.answer {
  margin-top: 20px;
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
}

/* PANEL */
#panel {
  position: fixed;
  top: 0;
  right: 0;
  width: 85vw;
  height: 100vh;
  background: #0f172a;
  transform: translateX(100%);
  transition: 0.3s;
  z-index: 1001;
}

#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(3px);
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
  z-index: 1000;
}

#toggleBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  padding: 12px 20px;
  border-radius: 50px;
}
    </style>
</head>
<body>
    <h1 style="font-size: 3.1em"> <img src="/public/media/DLOGGA.png" style="width:120px; height:40px;" >Spektrum-chatt med historik</h1>
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="query" placeholder="Ställ en fråga...">
        <button id="sendBtn">Skicka</button>
        <button id="newBtn">Ny konversation</button>
    </div>

    <div id="referenser">
    <h2> Referenser : </h2>
    <ul>
      <li> <a href="https://frekvensplanen.pts.se/"> Frekvensplanen </a>
      <li> <a href="https://pts.se/nyheter-och-pressmeddelanden/uppdaterad-inriktningsplan-for-spektrumhantering2/"> Inriktningsplanen </a>
      <li> <a href="https://undantag.pts.se/"> Undantagstillstånd </a>
    </ul>
    </div>
<!-- Overlay -->
<div id="overlay"></div>

<!-- Panel -->
<div id="panel">
  <iframe src="/static/spektrum_explorer.html" style="width:100%; height:100%; border:none;"></iframe>
</div>

<button id="toggleBtn" style="font-size: 18px"> <img src="/public/media/D.png" style="width:16px; height:16px;" >Spektrumutforskaren</button>

    <script>
        let conversationId = null;

        async function newConversation() {
            const resp = await fetch("/conversation/new", { method: "POST" });
            const data = await resp.json();
            conversationId = data.conversation_id;
            document.getElementById("chat").innerHTML = "";
            addMessage("system", "Ny konversation startad. Ställ din fråga. Du kan kontrollera information genom att använda 'Spektrumutforskaren' ");
        }

        function addMessage(role, text) {
            const chatDiv = document.getElementById("chat");
            const msgDiv = document.createElement("div");
            msgDiv.className = role;
            msgDiv.innerText = (role === "user" ? "Du: " : "Bot: ") + text;
            chatDiv.appendChild(msgDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        async function ask() {
            const queryInput = document.getElementById("query");
            const query = queryInput.value.trim();
            if (!query) return;
            if (!conversationId) {
                await newConversation();
            }
            addMessage("user", query);
            queryInput.value = "";
            const answerDiv = document.createElement("div");
            answerDiv.className = "bot";
            answerDiv.innerText = "Bot: ";
            const chatDiv = document.getElementById("chat");
            chatDiv.appendChild(answerDiv);

            const response = await fetch("/ask", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ query, conversation_id: conversationId })
            });
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let done = false;
            while (!done) {
                const { value, done: doneReading } = await reader.read();
                done = doneReading;
                const chunk = decoder.decode(value);
                answerDiv.innerText += chunk;
                chatDiv.scrollTop = chatDiv.scrollHeight;
            }
        }

        document.getElementById("sendBtn").onclick = ask;
        document.getElementById("newBtn").onclick = newConversation;

        // Starta första konversationen
        newConversation();

// PANEL LOGIK
const panel = document.getElementById("panel");
const overlay = document.getElementById("overlay");
const btn = document.getElementById("toggleBtn");

let open = false;

function openPanel() {
  panel.style.transform = "translateX(0)";
  overlay.style.opacity = "1";
  overlay.style.pointerEvents = "auto";
  document.body.style.overflow = "hidden";
  open = true;
}

function closePanel() {
  panel.style.transform = "translateX(100%)";
  overlay.style.opacity = "0";
  overlay.style.pointerEvents = "none";
  document.body.style.overflow = "";
  open = false;
}

btn.onclick = () => open ? closePanel() : openPanel();
overlay.onclick = closePanel;

document.addEventListener("keydown", e => {
  if (e.key === "Escape") closePanel();
});
    </script>
</body>
</html>
